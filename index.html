<script>
// ========== J-Quants API (Vercel Serverless Function経由) ==========
// /api/jquants がプロキシ。APIキーはVercel環境変数JQUANTS_API_KEYで管理。
let isLiveMode=false;
const API_PROXY='/api/jquants';
const debugEl=document.getElementById('debug');

function debug(msg){
  if(!debugEl)return;
  debugEl.style.display='block';
  const ts=new Date().toLocaleTimeString('ja-JP');
  debugEl.innerHTML+=ts+' '+msg+'<br>';
  debugEl.scrollTop=debugEl.scrollHeight;
  console.log('[JQ]',msg);
}

async function fetchLivePrices(){
  const now=new Date();
  const target=new Date(now.getTime()-12*7*86400000-3*86400000);
  for(let i=0;i<10;i++){
    const d=new Date(target.getTime()-i*86400000);
    const wday=d.getDay();
    if(wday===0||wday===6)continue;
    const ymd=d.toISOString().slice(0,10).replace(/-/g,'');
    debug('Fetching '+ymd+' ...');
    try{
      const params=new URLSearchParams({path:'/v1/prices/daily_quotes',date:ymd});
      const r=await fetch(API_PROXY+'?'+params.toString());
      if(r.status===500){
        const j=await r.json();
        debug('  → server error: '+(j.error||'unknown'));
        if(j.hint){debug('  → hint: '+j.hint);}
        throw new Error(j.error||'Server error');
      }
      if(r.status===401||r.status===403){
        debug('  → '+r.status+' auth error');
        throw new Error('API key invalid or expired (HTTP '+r.status+')');
      }
      if(!r.ok){
        debug('  → HTTP '+r.status);
        continue;
      }
      const data=await r.json();
      if(data.daily_quotes&&data.daily_quotes.length>0){
        debug('  → got '+data.daily_quotes.length+' quotes');
        return {date:ymd,quotes:data.daily_quotes};
      }
      debug('  → 0 quotes, trying previous day');
    }catch(e){
      debug('  → fetch error: '+e.message);
      if(e.message.includes('invalid')||e.message.includes('Server'))throw e;
      continue;
    }
  }
  return null;
}

window._applyLiveData=null;

document.getElementById('loginBtn').addEventListener('click',async()=>{
  const err=document.getElementById('err'),btn=document.getElementById('loginBtn');
  btn.textContent='CONNECTING...';err.textContent='';
  debugEl.innerHTML='';
  try{
    const q=await fetchLivePrices();
    if(!q||!q.quotes||!q.quotes.length){
      throw new Error('データ取得失敗');
    }
    isLiveMode=true;
    document.getElementById('login').style.display='none';
    if(window._applyLiveData)window._applyLiveData(q);
    setInterval(async()=>{
      try{
        const q=await fetchLivePrices();
        if(q&&window._applyLiveData)window._applyLiveData(q);
      }catch(e){console.error(e);}
    },3600000);
  }catch(e){
    err.innerHTML=e.message;
    btn.textContent='CONNECT';
  }
});

let audioCtx=null,audioEnabled=false,masterGain=null;
function enableAudio(){
  if(audioEnabled) return;
  try{
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();
    masterGain.gain.value=0.15;
    masterGain.connect(audioCtx.destination);
    audioEnabled=true;
    audioBtn.textContent='♪ sound on';
    audioBtn.style.color='#111';
  }catch(e){audioBtn.textContent='♪ audio unavailable';}
}

function playClick(pitch,vol){
  if(!audioEnabled||!audioCtx) return;
  const now=audioCtx.currentTime;
  const osc=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  osc.type='sine';
  osc.frequency.setValueAtTime(pitch,now);
  osc.frequency.exponentialRampToValueAtTime(pitch*0.5,now+0.04);
  g.gain.setValueAtTime(0,now);
  g.gain.linearRampToValueAtTime(vol,now+0.002);
  g.gain.exponentialRampToValueAtTime(0.0001,now+0.06);
  osc.connect(g);g.connect(masterGain);
  osc.start(now);osc.stop(now+0.08);
  const bufSize=audioCtx.sampleRate*0.02;
  const buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/bufSize,3);
  const noise=audioCtx.createBufferSource();
  const ng=audioCtx.createGain();
  ng.gain.value=vol*0.3;
  noise.buffer=buf;
  noise.connect(ng);ng.connect(masterGain);
  noise.start(now);
}

function playShock(){

}

function project(x,y,z){
  const cy=Math.cos(rotX),sy=Math.sin(rotX);
  const y2=y*cy-z*sy;
  const z2=y*sy+z*cy;
  const cx=Math.cos(rotY),sx=Math.sin(rotY);
  const x2=x*cx+z2*sx;
  const z3=-x*sx+z2*cx;
  const persp=500/(500+z3);
  return{x:W/2+x2*persp*zoom,y:H/2+y2*persp*zoom,z:z3,s:persp*zoom};
}

    [7011,7012,7013,6301,6326,6367,6098,6273,6103,6113,6302,6305,6361,6376,6412,6417,5401,5411,5406,5631,5713,5714,5706,5707,5541,5801,5802,5803,5201,5214,5301,5332,1801,1802,1803,1812,1721,1925,1928,1332,1333,1301,1605,5001,5006,5019,8001,8002,8015,8031,8053,8058,9101,9104,9107,9001,9005,9007,9008,9009,9020,9021,9022,9062,9064,9201,9202,9301,9501,9502,9503,9531,9532,3401,3402,3407,3436,4004,4005,4021,4042,4063,4183,4188,4208],
    // pharma → 5
    [4502,4503,4506,4507,4519,4523,4527,4543,4568,4578,4901,4902,2002,2269,2282,2501,2502,2503,2801,2802,2871,2914]
  ];
  const codeToSec={};
  sectorCodes.forEach((codes,si)=>codes.forEach(c=>{codeToSec[c]=si;}));

  codeQuoteMap.forEach((v,code)=>{
    const si=codeToSec[code];
    if(si===undefined)return;
    sectorChanges[si]+=v.change;
    sectorCounts[si]++;
  });
  for(let i=0;i<6;i++){
    if(sectorCounts[i]>0){
      sectorChanges[i]/=sectorCounts[i];
    }
  }
  // stocksに反映（セクター平均 + 個別ノイズ）
  stocks.forEach(s=>{
    const secAvg=sectorChanges[s.sector];
    const noise=(Math.random()-0.5)*s.sigma*1.5;
    const newChange=secAvg+noise;
    const newPrice=s.anchorPrice*(1+newChange);
    s.price=newPrice;
    s.anchorPrice=newPrice; // 実データが来たらアンカーを更新
    s.basePrice=newPrice;
    s.change=newChange;
    s.flashTimer=30;
  });

  const dateStr=result.date.slice(0,4)+'/'+result.date.slice(4,6)+'/'+result.date.slice(6,8);
  modeInd.textContent='LIVE · '+codeQuoteMap.size+' quotes · '+dateStr;
};

let t=0;
let hoveredStock=null,hoveredSector=-1;

function frame(){
  t++;
  rotX+=(targetRotX-rotX)*0.08;
  rotY+=(targetRotY-rotY)*0.08;
  if(!dragging) targetRotY+=0.0012;

  shockTimer--;
  if(shockTimer<=0){triggerShock();shockTimer=500+Math.random()*600;}
  shockPower*=0.92; // 減衰を早めた (0.96 → 0.92)

  clickBudget=Math.min(clickBudget+0.3,8);

  let idxSum=0,idxBaseSum=0;
  stocks.forEach(s=>{
    const prevChange=s.change;

    // ★★★ シミュレーション修正: 平均回帰 + 対称なショック ★★★
    // 1. 対称なガウスノイズ
    const noise=(Math.random()-0.5)*s.sigma*0.15;

    // 2. ショックバイアス（対称にする: 0.5〜1.3 → -0.4〜+0.4）
    const shockContrib=shockPower*(Math.random()*0.8-0.4+1)*0.3;
    // ↑ shockPowerは既に符号を持っているので、これを軽く拡散させるだけ

    // 3. 平均回帰: アンカー価格から乖離するほど引き戻される
    const dev=(s.price-s.anchorPrice)/s.anchorPrice;
    const meanReversion=-dev*0.02;

    const totalChange=noise+shockContrib+meanReversion;
    // 1tickあたりの変動を±2%に制限
    const clamped=Math.max(-0.02,Math.min(0.02,totalChange));
    s.price=Math.max(50,s.price*(1+clamped));

    s.change=(s.price-s.basePrice)/s.basePrice;
    const delta=s.change-prevChange;

    if(Math.abs(delta)>0.0015&&clickBudget>=1&&Math.random()<0.4){
      clickBudget--;
      const pitch=delta>0?1200+Math.random()*400:500+Math.random()*200;
      const vol=Math.min(0.5,Math.abs(delta)*80);
      playClick(pitch,vol);
      s.flashTimer=15;
    }
    if(s.flashTimer>0) s.flashTimer--;
    s.radius=s.baseRadius*(1+s.change*1.5); // 半径膨張も抑えめに (3 → 1.5)
    s.angle+=s.speed*(1+Math.abs(s.change)*5);
    idxSum+=s.price;
    idxBaseSum+=s.basePrice;
  });
  indexValue=indexBase*(idxSum/idxBaseSum);
  indexChange=(indexValue-indexBase)/indexBase;
  idxVal.textContent='¥ '+Math.round(indexValue).toLocaleString();
  idxChg.textContent=(indexChange>=0?'+':'')+(indexChange*100).toFixed(2)+'%';
  idxChg.style.color=indexChange>=0?'#3a6040':'#8a3030';

  ctx.fillStyle='#fafaf7';
  ctx.fillRect(0,0,W,H);

  hoveredSector=-1;
  let minD=25;
  SECTORS.forEach((sec,si)=>{
    const avgR=140+90+si*6;
    for(let a=0;a<Math.PI*2;a+=0.15){
      const x=Math.cos(a)*avgR;
      const y=Math.sin(sec.tilt)*Math.sin(a)*avgR*0.3;
      const z=Math.cos(sec.tilt)*Math.sin(a)*avgR;
      const p=project(x,y,z);
      const d=Math.hypot(p.x-mx,p.y-my);
      if(d<minD){minD=d;hoveredSector=si;}
    }
  });

  SECTORS.forEach((sec,si)=>{
    const hl=hoveredSector===si;
    ctx.strokeStyle=hl?'rgba(0,0,0,0.55)':'rgba(0,0,0,0.1)';
    ctx.lineWidth=hl?0.8:0.3;
    for(let rStep=0;rStep<3;rStep++){
      const r=140+rStep*70+si*6;
      ctx.beginPath();
      for(let a=0;a<=Math.PI*2+0.1;a+=0.04){
        const x=Math.cos(a)*r;
        const y=Math.sin(sec.tilt)*Math.sin(a)*r*0.3;
        const z=Math.cos(sec.tilt)*Math.sin(a)*r;
        const p=project(x,y,z);
        if(a===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);
      }
      ctx.stroke();
    }
  });

  const towerH=180+indexChange*500+Math.sin(t*0.03)*Math.abs(shockPower)*300;
  const towerTop=project(0,-towerH,0);
  const towerBot=project(0,90,0);
  for(let i=0;i<6;i++){
    const yy=90-i*(towerH+90)/6;
    const rr=18-i*2.5;
    if(rr<=0) continue;
    ctx.strokeStyle='rgba(0,0,0,0.18)';
    ctx.lineWidth=0.4;
    ctx.beginPath();
    for(let a=0;a<=Math.PI*2+0.1;a+=0.1){
      const x=Math.cos(a)*rr;
      const z=Math.sin(a)*rr;
      const p=project(x,yy,z);
      if(a===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();
  }
  ctx.strokeStyle='rgba(0,0,0,0.85)';
  ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo(towerBot.x,towerBot.y);
  ctx.lineTo(towerTop.x,towerTop.y);
  ctx.stroke();
  for(let i=1;i<6;i++){
    const yy=90-i*(towerH+90)/6;
    const p1=project(-9,yy,0);
    const p2=project(9,yy,0);
    const p3=project(0,yy,-9);
    const p4=project(0,yy,9);
    ctx.strokeStyle='rgba(0,0,0,0.35)';
    ctx.lineWidth=0.4;
    ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p3.x,p3.y);ctx.lineTo(p4.x,p4.y);ctx.stroke();
  }
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(towerTop.x,towerTop.y,2.5,0,Math.PI*2);ctx.fill();

  const proj=stocks.map(s=>{
    const sec=SECTORS[s.sector];
    // ★ 浮遊オフセット: 低周波の正弦波を複数重ねて、ゆっくり漂う動きを作る
    const floatR=Math.sin(t*s.fSpeedA+s.fA)*s.fRadAmp
                +Math.sin(t*s.fSpeedB*0.7+s.fB)*s.fRadAmp*0.4;
    const floatAng=Math.sin(t*s.fSpeedB+s.fB)*s.fAngAmp
                  +Math.sin(t*s.fSpeedC*0.8+s.fC)*s.fAngAmp*0.4;
    const floatTilt=Math.sin(t*s.fSpeedC+s.fC)*s.fTiltAmp
                   +Math.sin(t*s.fSpeedA*0.6+s.fA)*s.fTiltAmp*0.35;

    const effR=s.radius+floatR;
    const effAng=s.angle+floatAng;
    const effTilt=sec.tilt+floatTilt;

    const x=Math.cos(effAng)*effR;
    const y=Math.sin(effTilt)*Math.sin(effAng)*effR*0.3;
    const z=Math.cos(effTilt)*Math.sin(effAng)*effR;
    const p=project(x,y,z);
    return{s,p};
  }).sort((a,b)=>b.p.z-a.p.z);

  hoveredStock=null;
  let closest=14;
  proj.forEach(({s,p})=>{
    const intensity=Math.min(1,Math.abs(s.change)*30);
    const alpha=0.35+intensity*0.55;
    const shade=s.change>0?Math.floor(20+intensity*40):Math.floor(110+intensity*80);
    if(s.flashTimer>0){
      const fa=s.flashTimer/15;
      ctx.strokeStyle='rgba(0,0,0,'+(fa*0.6)+')';
      ctx.lineWidth=0.5;
      ctx.beginPath();
      ctx.arc(p.x,p.y,Math.max(3,s.size*p.s*1.2+(15-s.flashTimer)*0.8),0,Math.PI*2);
      ctx.stroke();
    }
    ctx.fillStyle='rgba('+shade+','+shade+','+shade+','+alpha+')';
    ctx.beginPath();
    ctx.arc(p.x,p.y,Math.max(0.8,s.size*p.s*1.2),0,Math.PI*2);
    ctx.fill();
    if(Math.abs(s.change)>0.003){
      const sec=SECTORS[s.sector];
      const bx=Math.cos(s.angle)*s.baseRadius;
      const by=Math.sin(sec.tilt)*Math.sin(s.angle)*s.baseRadius*0.3;
      const bz=Math.cos(sec.tilt)*Math.sin(s.angle)*s.baseRadius;
      const bp=project(bx,by,bz);
      ctx.strokeStyle='rgba(0,0,0,'+(0.15+intensity*0.4)+')';
      ctx.lineWidth=0.3;
      ctx.beginPath();ctx.moveTo(bp.x,bp.y);ctx.lineTo(p.x,p.y);ctx.stroke();
    }
    const d=Math.hypot(p.x-mx,p.y-my);
    if(d<closest){closest=d;hoveredStock=s;}
  });

  // 明朝体ラベル
  const labeled=[];
  proj.forEach(({s,p})=>{
    if(p.z<-50) return;
    if(p.s<0.7) return;
    let tooClose=false;
    for(const l of labeled){
      if(Math.hypot(l.p.x-p.x,l.p.y-p.y)<55){tooClose=true;break;}
    }
    if(tooClose) return;
    if(s.size<2.1 && Math.abs(s.change)<0.005 && s.flashTimer===0) return;
    labeled.push({s,p});
  });

  labeled.forEach(({s,p})=>{
    const fontSize=Math.max(9,Math.min(13,10*p.s));
    const dx=(p.x>W/2)?8:-8;
    const align=(p.x>W/2)?'left':'right';
    ctx.strokeStyle='rgba(0,0,0,0.25)';
    ctx.lineWidth=0.3;
    ctx.beginPath();
    ctx.moveTo(p.x+(dx>0?2:-2),p.y);
    ctx.lineTo(p.x+dx,p.y);
    ctx.stroke();
    ctx.font=fontSize+"px "+MINGYO;
    ctx.fillStyle='rgba(0,0,0,0.82)';
    ctx.textAlign=align;
    ctx.fillText(s.name,p.x+dx,p.y-1);
    ctx.font=(fontSize-2)+"px "+MINGYO;
    ctx.fillStyle=s.change>=0?'rgba(0,0,0,0.6)':'rgba(80,80,80,0.65)';
    const priceStr='¥'+Math.round(s.price).toLocaleString()+' '+(s.change>=0?'+':'')+(s.change*100).toFixed(2)+'%';
    ctx.fillText(priceStr,p.x+dx,p.y+fontSize+1);
  });

  // 注釈
  const ann=[
    {angle:0.3,text:'SECTOR 01 / TECH'},
    {angle:1.1,text:'VOL 0.47'},
    {angle:2.0,text:'σ = 0.0128'},
    {angle:2.9,text:'FINANCIAL'},
    {angle:3.8,text:'AUTO CLUSTER'},
    {angle:4.7,text:'LIQUIDITY'},
    {angle:5.5,text:'INDUSTRIAL'}
  ];
  ctx.font='8px monospace';
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.strokeStyle='rgba(0,0,0,0.22)';
  ctx.lineWidth=0.3;
  ann.forEach(a=>{
    const ix=Math.cos(a.angle)*310;
    const iz=Math.sin(a.angle)*310;
    const ip=project(ix,0,iz);
    const ox=Math.cos(a.angle)*380;
    const oz=Math.sin(a.angle)*380;
    const op=project(ox,0,oz);
    ctx.beginPath();ctx.moveTo(ip.x,ip.y);ctx.lineTo(op.x,op.y);ctx.stroke();
    ctx.beginPath();ctx.arc(op.x,op.y,1.5,0,Math.PI*2);ctx.fill();
    const right=op.x>W/2;
    ctx.textAlign=right?'left':'right';
    ctx.fillText(a.text,op.x+(right?6:-6),op.y+3);
  });

  if(hoveredStock){
    const s=hoveredStock;
    tip.innerHTML='<div style="font-weight:500;font-family:'+MINGYO+';font-size:12px;">'+s.name+'</div>'+
      '<div style="color:#666">'+s.code+' · '+SECTORS[s.sector].name+'</div>'+
      '<div style="font-family:'+MINGYO+';">¥ '+Math.round(s.price).toLocaleString()+' ('+(s.change*100).toFixed(2)+'%)</div>';
    tip.style.display='block';
    tip.style.left=Math.min(mx+12,W-180)+'px';
    tip.style.top=Math.min(my+12,H-60)+'px';
  } else if(hoveredSector>=0){
    const sec=SECTORS[hoveredSector];
    const ss=stocks.filter(x=>x.sector===hoveredSector);
    const avg=ss.reduce((a,b)=>a+b.change,0)/ss.length;
    tip.innerHTML='<div style="font-weight:500">'+sec.name+'</div>'+
      '<div style="color:#666">'+sec.count+' stocks</div>'+
      '<div>avg: '+(avg*100).toFixed(2)+'%</div>';
    tip.style.display='block';
    tip.style.left=Math.min(mx+12,W-140)+'px';
    tip.style.top=Math.min(my+12,H-60)+'px';
  } else {
    tip.style.display='none';
  }

  requestAnimationFrame(frame);
}
frame();
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
} else {
  init();
}
})();
</script>
</body>
